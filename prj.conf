CONFIG_INIT_STACKS=y
CONFIG_NET_L2_WIFI_MGMT=y

CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_AI_MAX_ENTRIES=10

CONFIG_NET_SOCKETS=y
CONFIG_HTTP_CLIENT=y

# Use DHCP for IPv4
CONFIG_NET_DHCPV4=y

# Or assign a static IP address (useful for testing)
# Following line must be enabled, otherwise WiFi connection fails with -1.
CONFIG_NET_CONFIG_SETTINGS=y
# Add CONFIG_INIT_TIMEOUT to prevent 30 second timeout when starting:
# [00:00:30.600,250] <err> net_config: Timeout while waiting network interface
# [00:00:30.600,250] <err> net_config: Network initialization failed (-115)
CONFIG_NET_CONFIG_INIT_TIMEOUT=0
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.0.12"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.0.254"
CONFIG_NET_CONFIG_NEED_IPV6=y
CONFIG_NET_CONFIG_MY_IPV6_ADDR="fe80::100"

# Enabling logging can be helpful for debugging
# Disabled logging to save memory
CONFIG_NET_LOG=n
CONFIG_WIFI_LOG_LEVEL_ERR=n
CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=n
CONFIG_DNS_RESOLVER=y

# Increased stack sizes to prevent overflow
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=2048
CONFIG_NET_TCP_WORKQ_STACK_SIZE=2048

CONFIG_NET_PKT_RX_COUNT=20
CONFIG_NET_PKT_TX_COUNT=20
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20

# Reduced networking contexts to fit in DRAM
CONFIG_NET_MAX_CONTEXTS=8
CONFIG_NET_MAX_CONN=8

# Added to prevent error with missing #include <ethernet/eth_stats.h> for esp_wifi_drv.c
# Adding this line will cause CMAKE Warning: No SOURCES given to Zephyr library: drivers__ethernet
# Just ignore.
CONFIG_NET_L2_ETHERNET=y

# Wi-Fi Configuration
CONFIG_WIFI=y
CONFIG_BT=n
CONFIG_SIZE_OPTIMIZATIONS=y

# Network Configuration
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_IF_MAX_IPV4_COUNT=2
CONFIG_NET_IF_MAX_IPV6_COUNT=2
CONFIG_NET_IPV4=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=10
# Reduced MGMT event stack size to fit into DRAM
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048
# Drastically reduced buffers
# Minimized buffers
CONFIG_NET_PKT_RX_COUNT=1
CONFIG_NET_PKT_TX_COUNT=1
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NETWORKING=y

# LOG Configuration
# [MEMORY FIX] Disabling Logging: 
# The build was failing with 'DRAM data does not fit' (overflow by ~3.7KB).
# Disabling network logging saves significant memory (buffers + text strings).
# [MEMORY FIX] Removing Debug Logging Levels:
# Removing these ensures no debug strings are compiled in, saving ~2.2KB MORE RAM.
CONFIG_NET_DHCPV4_SERVER_LOG_LEVEL_DBG=y
CONFIG_NET_L2_WIFI_MGMT_LOG_LEVEL_DBG=y


CONFIG_POSIX_API=y

CONFIG_REBOOT=y 

CONFIG_NETWORKING=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y



CONFIG_NET_IF_MAX_IPV6_COUNT=2
CONFIG_NET_IF_MAX_IPV4_COUNT=2

CONFIG_ZVFS_POLL_MAX=9

CONFIG_MDNS_RESPONDER=y
CONFIG_DNS_SD=y
CONFIG_MDNS_RESPONDER_DNS_SD=y

CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_INIT_STACKS=y

#loginggggggggggggggg
#CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_DEFERRED=y # moves log processing out of ISR/thread context to a background thread
# CONFIG_LOG_MODE_MINIMAL=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_NET_STATISTICS=y

CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=2
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=2
CONFIG_NET_IF_MCAST_IPV4_ADDR_COUNT=2

# Increased buffers
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

CONFIG_NET_SHELL=y

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::2"
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.2"

# Increased stack sizes for stability
CONFIG_MAIN_STACK_SIZE=8192
# Doubled from 4096 — was at 99% usage
CONFIG_ISR_STACK_SIZE=8192
CONFIG_IDLE_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
# Full register dump + backtrace on crash
CONFIG_FAULT_DUMP=2
CONFIG_XSI_THREADS_EXT=y

CONFIG_DYNAMIC_THREAD=y
CONFIG_DYNAMIC_THREAD_ALLOC=y
CONFIG_POSIX_PTHREAD_ATTR_STACKSIZE_BITS=23
CONFIG_POSIX_PTHREAD_ATTR_GUARDSIZE_BITS=9

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

CONFIG_ZLIB=y
CONFIG_PDFIO=y

CONFIG_PSA_CRYPTO=y
CONFIG_DEBUG=y

CONFIG_TLS_CREDENTIALS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_CERT_VERIFY_CALLBACK=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=3
CONFIG_TLS_MAX_CREDENTIALS_NUMBER=5
CONFIG_MBEDTLS_ENABLE_HEAP=y
# Reduced MBEDTLS heap size to fit into DRAM
CONFIG_MBEDTLS_HEAP_SIZE=1024
CONFIG_MBEDTLS_ECDSA_C=y


# Enabled LIBCUPS to provide missing headers (cups/tests.h)
CONFIG_LIBCUPS=y
# Enabled PAPPL to link pappl* functions
CONFIG_PAPPL=y
CONFIG_NEWLIB_LIBC=y
CONFIG_POSIX_API=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_CFG_FILE="config-mbedtls.h"
CONFIG_COMPILER_OPT="-DMBEDTLS_FS_IO"
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_X509_CRT_WRITE_C=y
CONFIG_MBEDTLS_X509_CSR_WRITE_C=y
CONFIG_MBEDTLS_X509_CSR_PARSE_C=y
CONFIG_MBEDTLS_PK_WRITE_C=y
CONFIG_MBEDTLS_ENTROPY_C=y
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
CONFIG_MBEDTLS_HASH_ALL_ENABLED=y
# Enabled but controlled to fix linker error (mbedtls_strerror)
CONFIG_MBEDTLS_DEBUG=y
# CONFIG_MBEDTLS_DEBUG_LEVEL=0
CONFIG_MBEDTLS_KEY_EXCHANGE_RSA_ENABLED=y
CONFIG_MBEDTLS_PKCS1_V15=y
CONFIG_MBEDTLS_X509_CRL_PARSE_C=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP521R1_ENABLED=y
CONFIG_MBEDTLS_RSA_C=y
CONFIG_MBEDTLS_SSL_PROTO_TLS1_2=y
# Enable all PSA crypto features to ensure ECC-PSA utility functions work
CONFIG_PSA_CRYPTO_ENABLE_ALL=y
CONFIG_MBEDTLS_USER_CONFIG_ENABLE=y
CONFIG_MBEDTLS_USER_CONFIG_FILE="/home/omkar/Desktop/zephyr-example/user-mbedtls.h"

# CONFIG_MBEDTLS_USER_CONFIG_ENABLE=y
# CONFIG_MBEDTLS_USER_CONFIG_FILE="mbedtls/custom_config.h"

# [MEMORY FIX] Disabling Heavy Printf Features:
# Explicitly setting to 'n' to override board defaults. 
# Floating point support (~10KB) and full integral support must be disabled.
CONFIG_CBPRINTF_FULL_INTEGRAL=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_CBPRINTF_COMPLETE=y
CONFIG_CBPRINTF_LIBC_SUBSTS=y

CONFIG_POSIX_ENV_LOG_LEVEL_DBG=y
CONFIG_PTHREAD_LOG_LEVEL_DBG=y
CONFIG_POSIX_THREAD_THREADS_MAX=16

CONFIG_SYMTAB=y

CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_SYS_HEAP_LISTENER=y

CONFIG_SHELL=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y

CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=30

CONFIG_DEBUG=y
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_GDBSTUB=n
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_MONITOR=y

# Logging and Console Configuration
CONFIG_LOG=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_BOOT_BANNER=y

# Tracing Configuration
# Disabled TRACING_BACKEND_UART to prevent conflict with standard text logs on Serial/Screen.
# Application uses manual printk-based traces in main.c.
CONFIG_TRACING=n
CONFIG_TRACING_USER=n
CONFIG_TRACING_BACKEND_UART=n